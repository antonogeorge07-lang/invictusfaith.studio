<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invictusfaith - Direct AI Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; margin: auto; background: #f9fafb; }
    .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, textarea, button { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
    button:hover { background: #333; }
    #result { margin-top: 20px; padding: 15px; background: #1e1e1e; color: #00ff00; border-radius: 6px; white-space: pre-wrap; font-family: monospace; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Direct Backend Test</h2>
    <p>Calls the assign-ticket edge function on project oawaputafziqpwolqvvc.</p>

    <form id="ticketForm">
      <input type="text" id="clientName" placeholder="Client Name" required />
      <input type="text" id="title" placeholder="Project Title (e.g., Website is down)" required />
      <textarea id="description" rows="4" placeholder="Detailed Description..." required></textarea>
      <button type="submit">Route with AI</button>
    </form>
    <div id="result"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://oawaputafziqpwolqvvc.supabase.co/functions/v1/assign-ticket";
    // TODO: paste the anon key for project oawaputafziqpwolqvvc below (long JWT starting with eyJ...)
    const ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";

    document.getElementById('ticketForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.style.color = '#fff';
      resultDiv.innerText = "Sending to Supabase + OpenAI...";

      const payload = {
        clientName: document.getElementById('clientName').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
      };

      try {
        const response = await fetch(SUPABASE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ANON_KEY}`,
            'apikey': ANON_KEY,
          },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        resultDiv.style.color = '#00ff00';
        resultDiv.innerText = "AI Routing Success!\n\n" + JSON.stringify(data.assignment ?? data, null, 2);
      } catch (error) {
        resultDiv.style.color = '#ff4444';
        resultDiv.innerText = "Error: " + error.message;
      }
    });
  </script>
</body>
</html>
